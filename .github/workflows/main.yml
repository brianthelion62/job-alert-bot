# =========================
# GitHub Actions Workflow
# .github/workflows/jobs.yml
# =========================
name: Job Alert Bot

on:
  schedule:
    - cron: "0 13 * * *"  # daily at 8am CST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run script
        run: python main.py
